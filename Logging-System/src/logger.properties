# Logging System Configuration
# Similar to Spring Boot's application.properties

# Log Level: TRACE, DEBUG, INFO, WARN, ERROR
logging.level=ERROR

# Log Format: SimpleTextFormat, ParameterizedLogFormat, TimeBasedFormat, ThreadBasedFormat, ClassFunctionBasedFormat
logging.format=ParameterizedLogFormat

# Log Appender: ConsolerAppender, FileAppender (if you have one)
logging.appender=ConsolerAppender

# Additional settings (for future use)
logging.file.path=logs/application.log
logging.pattern=%d{yyyy-MM-dd HH:mm:ss} [%level] [%thread] %class.%method - %msg

